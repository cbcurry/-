<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>合伙人专属后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: linear-gradient(145deg, #f0f7ff 0%, #e9f0fa 100%); padding: 20px 16px 48px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 32px; padding: 24px; margin-bottom: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid rgba(46,91,150,0.1); }
        h2 { font-size: 24px; font-weight: 700; color: #1e4663; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; color: #2c6280; margin-bottom: 6px; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #c2d6e8; border-radius: 30px; font-size: 15px; font-family: inherit; background: #fff; }
        input:focus, textarea:focus { outline: none; border-color: #2a86d4; box-shadow: 0 0 0 2px rgba(42,134,212,0.2); }
        button { background: #2a86d4; color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; font-size: 15px; cursor: pointer; margin-right: 12px; }
        button:hover { background: #1e6cb0; }
        .btn-secondary { background: #eef2f5; color: #2c6eaf; }
        .btn-secondary:hover { background: #e2e9f0; }
        .delete-btn { background: #dc3545; padding: 6px 12px; font-size: 13px; }
        .delete-btn:hover { background: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px 12px; text-align: left; }
        th { background: #eef2f5; color: #1e4663; font-weight: 600; }
        .share-link { background: #f0f4fa; padding: 12px; border-radius: 20px; margin-top: 16px; word-break: break-all; font-size: 14px; }
        .qrcode-area { display: flex; justify-content: center; margin: 16px 0; position: relative; }
        .qr-container { position: relative; display: inline-block; }
        .qr-container img { display: block; max-width: 100%; height: auto; }
        .save-qr-btn { background: #28a745; margin-top: 12px; display: inline-block; width: auto; }
        .loading { text-align: center; padding: 40px; color: #6c86a3; }
        .error { color: #dc3545; background: #ffe6e6; padding: 12px; border-radius: 20px; margin-bottom: 20px; }
        .login-form { max-width: 400px; margin: 0 auto; }
        @media (max-width: 600px) { .card { padding: 18px; } h2 { font-size: 20px; } table, thead, tbody, th, td, tr { display: block; } thead { display: none; } tr { margin-bottom: 16px; border: 1px solid #ddd; border-radius: 16px; padding: 12px; } td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 8px 0; } td:before { content: attr(data-label); font-weight: 600; width: 40%; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="container" id="app">
    <div class="loading">加载中...</div>
</div>

<script>
    // 获取 URL 参数 token（若存在则跳过登录）
    const urlParams = new URLSearchParams(window.location.search);
    let token = urlParams.get('token');
    let appDiv = document.getElementById('app');

    // 检查是否需要登录
    if (!token) {
        // 显示登录表单
        showLoginForm();
    } else {
        // 直接加载后台
        loadBackend();
    }

    function showLoginForm() {
        appDiv.innerHTML = `
            <div class="card login-form">
                <h2>🔐 合伙人登录</h2>
                <div class="form-group">
                    <label>工号</label>
                    <input type="text" id="loginEmployeeId" placeholder="请输入9位工号" maxlength="9">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button id="loginBtn">登录</button>
                <div id="loginError" class="error" style="margin-top:12px;"></div>
                <div style="text-align:center; margin-top:16px;">
                    <a href="/register.html" style="color:#2a86d4;">还没有账号？立即注册</a>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const employeeId = document.getElementById('loginEmployeeId').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!employeeId || !password) {
                document.getElementById('loginError').innerText = '请填写工号和密码';
                return;
            }
            if (!/^\d{9}$/.test(employeeId)) {
                document.getElementById('loginError').innerText = '工号必须为9位数字';
                return;
            }
            try {
                const res = await fetch('/api/partner/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId, password })
                });
                const data = await res.json();
                if (res.ok) {
                    // 登录成功，跳转到带 token 的页面
                    window.location.href = `/partner.html?token=${data.token}`;
                } else {
                    document.getElementById('loginError').innerText = data.error || '登录失败';
                }
            } catch (err) {
                document.getElementById('loginError').innerText = '网络错误，请稍后重试';
            }
        });
    }

    async function loadBackend() {
        // 验证 token 是否有效，并加载合伙人信息
        try {
            const res = await fetch(`/api/partner/${token}`);
            if (!res.ok) {
                // token 无效，清除 URL 参数并重新登录
                window.location.href = '/partner.html';
                return;
            }
            const partner = await res.json();
            renderBackend(partner);
        } catch (err) {
            appDiv.innerHTML = '<div class="error">加载失败，请刷新重试</div>';
        }
    }

    async function renderBackend(partner) {
        appDiv.innerHTML = `
            <div class="card">
                <h2>🔧 合伙人信息配置</h2>
                <div class="form-group"><label>姓名 *</label><input type="text" id="realName" placeholder="真实姓名" value="${escapeHtml(partner.realName)}"></div>
                <div class="form-group"><label>工号（9位数字） *</label><input type="text" id="employeeId" placeholder="工号" maxlength="9" value="${escapeHtml(partner.employeeId)}"></div>
                <div class="form-group"><label>微信号</label><input type="text" id="wechat" placeholder="用于客户添加咨询（可选）" value="${escapeHtml(partner.wechat)}"></div>
                <div class="form-group"><label>礼品领取地址</label><textarea id="address" rows="2" placeholder="例如：南京市浦口区弘阳广场梧桐假日酒店7楼瑞众保险（可选）">${escapeHtml(partner.address)}</textarea></div>
                <div class="form-group"><label>活动截止日期</label><input type="text" id="deadline" placeholder="例如：5月10日（可选）" value="${escapeHtml(partner.deadline)}"></div>
                <div class="form-group"><label>额外礼品提示</label><input type="text" id="giftExtra" placeholder="例如：展业赋能工具包+1v1规划（可选）" value="${escapeHtml(partner.giftExtra)}"></div>
                <div class="form-group"><label>修改密码（留空则不修改）</label><input type="password" id="password" placeholder="新密码（至少6位）"></div>
                <div><button id="saveConfigBtn">💾 保存配置</button><button id="refreshBtn" class="btn-secondary">🔄 刷新</button></div>
            </div>
            <div class="card">
                <h2>📱 您的专属客户问卷</h2>
                <div id="qrcode" class="qrcode-area"></div>
                <div class="share-link" id="shareLink"></div>
                <p style="font-size:12px; color:#6c86a3; text-align:center; margin-top:12px;">客户扫描二维码或点击链接即可参与测评，提交后数据自动归集到您的名下</p>
                <button id="saveQrBtn" class="save-qr-btn">💾 保存二维码图片（带背景）</button>
            </div>
            <div class="card">
                <h2>📊 客户提交记录</h2>
                <div id="recordsList">加载中...</div>
            </div>
        `;

        // 绑定保存配置事件
        document.getElementById('saveConfigBtn').addEventListener('click', async () => {
            const realName = document.getElementById('realName').value.trim();
            const employeeId = document.getElementById('employeeId').value.trim();
            const wechat = document.getElementById('wechat').value;
            const address = document.getElementById('address').value;
            const deadline = document.getElementById('deadline').value;
            const giftExtra = document.getElementById('giftExtra').value;
            const password = document.getElementById('password').value;
            if (!realName || !employeeId) {
                alert('姓名和工号不能为空');
                return;
            }
            if (!/^\d{9}$/.test(employeeId)) {
                alert('工号必须为9位数字');
                return;
            }
            const payload = { realName, employeeId, wechat, address, deadline, giftExtra };
            if (password) {
                if (password.length < 6) {
                    alert('密码长度至少6位');
                    return;
                }
                payload.password = password;
            }
            try {
                const res = await fetch(`/api/partner/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) alert('保存成功'); else alert('保存失败');
            } catch (err) { alert('网络错误'); }
        });

        document.getElementById('refreshBtn').addEventListener('click', () => { loadBackend(); });

        // 生成二维码及背景图片保存功能
        const shareUrl = `${window.location.origin}/?pid=${token}`;
        const shareLinkDiv = document.getElementById('shareLink');
        shareLinkDiv.innerHTML = `<strong>客户问卷链接：</strong><br><a href="${shareUrl}" target="_blank">${shareUrl}</a><br><button id="copyLinkBtn" class="btn-secondary" style="margin-top:8px;">📋 复制链接</button>`;
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(shareUrl); alert('链接已复制'); });

        // 生成二维码容器
        const qrcodeDiv = document.getElementById('qrcode');
        qrcodeDiv.innerHTML = '<div id="qrCanvasContainer" style="position: relative; display: inline-block;"></div>';
        const qrContainer = document.getElementById('qrCanvasContainer');
        // 使用 QRCode 生成二维码图片（固定尺寸）
        const qr = new QRCode(qrContainer, {
            text: shareUrl,
            width: 300,
            height: 300,
            colorDark: "#1e4663",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // 保存二维码图片（带背景）
        const saveQrBtn = document.getElementById('saveQrBtn');
        saveQrBtn.addEventListener('click', async () => {
            // 获取二维码图片元素（由 qrcode 库生成的 img）
            const qrImg = qrContainer.querySelector('img');
            if (!qrImg) {
                alert('二维码未生成');
                return;
            }
            // 背景图片 URL（请将您的背景图片放在 public 目录，如 bg.png）
            const bgUrl = '/bg.png';  // 替换为实际背景图片路径
            try {
                // 加载背景图片
                const bgImg = new Image();
                bgImg.crossOrigin = "Anonymous";
                bgImg.src = bgUrl;
                await new Promise((resolve, reject) => {
                    bgImg.onload = resolve;
                    bgImg.onerror = reject;
                });
                // 创建 canvas
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = bgImg.width;
                canvas.height = bgImg.height;
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                // 二维码居中绘制
                const qrSize = 250;
                const x = (canvas.width - qrSize) / 2;
                const y = (canvas.height - qrSize) / 2;
                ctx.drawImage(qrImg, x, y, qrSize, qrSize);
                // 下载图片
                const link = document.createElement('a');
                link.download = 'qr_with_bg.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error(err);
                alert('保存失败，请检查背景图片路径是否正确');
            }
        });

        // 加载客户记录
        await loadRecords();
    }

    async function loadRecords() {
        const recordsDiv = document.getElementById('recordsList');
        if (!recordsDiv) return;
        recordsDiv.innerHTML = '<div class="loading">加载中...</div>';
        try {
            const res = await fetch(`/api/partner/${token}/records`);
            if (!res.ok) throw new Error();
            const records = await res.json();
            if (records.length === 0) {
                recordsDiv.innerHTML = '<p style="text-align:center; color:#6c86a3;">暂无客户提交记录</p>';
                return;
            }
            let html = ` 能 <thead>  <tr><th>姓名</th><th>手机号</th><th>总分</th><th>等级</th><th>提交时间</th><th>操作</th></tr> </thead> <tbody>`;
            records.forEach(rec => {
                html += `<tr><td data-label="姓名">${escapeHtml(rec.name)}</td><td data-label="手机号">${escapeHtml(rec.phone)}</td><td data-label="总分">${rec.totalScore}</td><td data-label="等级">${escapeHtml(rec.level)}</td><td data-label="提交时间">${rec.createdAt}</td><td data-label="操作"><button class="delete-btn" data-id="${rec.id}">删除</button></td></tr>`;
            });
            html += `</tbody> </table>`;
            recordsDiv.innerHTML = html;
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (confirm('确定删除该记录吗？')) {
                        const id = btn.dataset.id;
                        await fetch(`/api/partner/${token}/records/${id}`, { method: 'DELETE' });
                        loadRecords();
                    }
                });
            });
        } catch (err) {
            recordsDiv.innerHTML = '<p class="error">加载记录失败，请刷新重试</p>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
</script>
</body>
</html>
