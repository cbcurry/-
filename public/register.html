<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合伙人注册</title>
    <style>
        body { font-family: system-ui; background: #f0f7ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 32px; padding: 32px; max-width: 400px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #1e4663; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbdde9; border-radius: 30px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #2a86d4; color: white; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; margin-top: 16px; }
        .error { color: #dc3545; font-size: 14px; margin-top: 8px; text-align: center; }
        .info { color: #6c86a3; font-size: 12px; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔑 合伙人注册</h2>
    <p style="color:#666; margin-bottom: 20px;">填写信息后，系统将为您生成专属二维码</p>
    <input type="text" id="wechat" placeholder="微信号 *" autocomplete="off">
    <input type="text" id="address" placeholder="礼品地址（可选）">
    <input type="text" id="deadline" placeholder="活动截止日期（可选，如 5月10日）">
    <input type="text" id="giftExtra" placeholder="额外礼品提示（可选）">
    <button id="registerBtn">立即注册</button>
    <div id="errorMsg" class="error"></div>
    <div class="info">注册后您将获得专属客户问卷链接和二维码</div>
</div>

<script>
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const wechat = document.getElementById('wechat').value.trim();
        if (!wechat) {
            document.getElementById('errorMsg').innerText = '请填写微信号';
            return;
        }
        const payload = {
            wechat,
            address: document.getElementById('address').value,
            deadline: document.getElementById('deadline').value,
            giftExtra: document.getElementById('giftExtra').value
        };
        try {
            const res = await fetch('/api/partner/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (res.ok) {
                // 注册成功，跳转到后台并携带 token
                window.location.href = `/partner.html?token=${data.token}`;
            } else {
                document.getElementById('errorMsg').innerText = data.error || '注册失败，请稍后重试';
            }
        } catch (err) {
            document.getElementById('errorMsg').innerText = '网络错误，请检查网络后重试';
        }
    });
</script>
</body>
</html>
